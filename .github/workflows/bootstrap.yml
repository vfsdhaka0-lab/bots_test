name: Bootstrap Android Flutter Project
on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create Flutter Project
        run: |
          flutter create --org com.aman.ai --project-name bots_test --platforms android,web .
      - name: Commit and Push generated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Generate Flutter project via Aman IDE"
            git push
          else
            echo "No changes to commit"
          fi
